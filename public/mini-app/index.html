<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CasinosAPI</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #0f0f0f);
      color: var(--tg-theme-text-color, #fff);
      min-height: 100vh;
      overflow-x: hidden;
    }
    .container { max-width: 480px; margin: 0 auto; padding: 12px; }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0 16px;
    }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header .count { font-size: 12px; opacity: 0.6; }
    .search-box {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--tg-theme-hint-color, #333);
      background: var(--tg-theme-secondary-bg-color, #1a1a1a);
      color: var(--tg-theme-text-color, #fff);
      font-size: 15px;
      margin-bottom: 12px;
    }
    .search-box:focus { outline: none; border-color: var(--tg-theme-button-color, #2481cc); }
    .filters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 8px;
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-chip {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--tg-theme-hint-color, #333);
      background: var(--tg-theme-secondary-bg-color, #1a1a1a);
      color: var(--tg-theme-text-color, #fff);
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-chip.active {
      background: var(--tg-theme-button-color, #2481cc);
      border-color: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
    }
    .casino-list { display: flex; flex-direction: column; gap: 10px; }
    .casino-card {
      background: var(--tg-theme-secondary-bg-color, #1a1a1a);
      border-radius: 14px;
      padding: 14px;
      cursor: pointer;
      transition: transform 0.15s;
      border: 1px solid transparent;
    }
    .casino-card:active { transform: scale(0.98); }
    .casino-card:hover { border-color: var(--tg-theme-hint-color, #333); }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .casino-name { font-size: 16px; font-weight: 600; }
    .trust-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 10px;
      background: #2d5016;
      color: #7cb342;
    }
    .trust-badge.medium { background: #5d4a00; color: #ffc107; }
    .trust-badge.low { background: #5d1a1a; color: #ef5350; }
    .card-header { position: relative; }
    .casino-card { border-left: 4px solid transparent; }
    .casino-card.status-ok { border-left-color: #4caf50; }
    .casino-card.status-issue { border-left-color: #ff9800; }
    .casino-card.status-defunct { border-left-color: #f44336; opacity: 0.55; }
    .bonus-line {
      font-size: 14px;
      color: var(--tg-theme-accent-text-color, #7cb342);
      font-weight: 500;
      margin-bottom: 6px;
    }
    .meta-row {
      display: flex;
      gap: 12px;
      font-size: 12px;
      opacity: 0.7;
      flex-wrap: wrap;
    }
    .meta-row span { display: flex; align-items: center; gap: 4px; }
    .loading {
      text-align: center;
      padding: 40px;
      opacity: 0.6;
    }
    .error {
      text-align: center;
      padding: 40px;
      color: #ef5350;
    }
    .detail-view {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--tg-theme-bg-color, #0f0f0f);
      z-index: 100;
      overflow-y: auto;
    }
    .detail-view.active { display: block; }
    .detail-header {
      padding: 16px;
      border-bottom: 1px solid var(--tg-theme-hint-color, #333);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--tg-theme-secondary-bg-color, #1a1a1a);
      color: var(--tg-theme-text-color, #fff);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .detail-content { padding: 16px; }
    .detail-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .detail-bonus {
      font-size: 18px;
      color: var(--tg-theme-accent-text-color, #7cb342);
      font-weight: 600;
      margin-bottom: 16px;
    }
    .detail-section {
      margin-bottom: 20px;
    }
    .detail-section h3 {
      font-size: 14px;
      text-transform: uppercase;
      opacity: 0.6;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .detail-section p {
      font-size: 14px;
      line-height: 1.6;
      opacity: 0.9;
    }
    .wagering-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .wagering-item {
      background: var(--tg-theme-secondary-bg-color, #1a1a1a);
      padding: 12px;
      border-radius: 10px;
    }
    .wagering-item .label { font-size: 11px; opacity: 0.6; margin-bottom: 4px; }
    .wagering-item .value { font-size: 16px; font-weight: 600; }
    .visit-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
    }
    .visit-btn:active { opacity: 0.8; }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      opacity: 0.5;
    }
    .sort-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .sort-bar select {
      background: var(--tg-theme-secondary-bg-color, #1a1a1a);
      color: var(--tg-theme-text-color, #fff);
      border: 1px solid var(--tg-theme-hint-color, #333);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container" id="listView">
    <div class="header">
      <h1>CasinosAPI</h1>
      <span class="count" id="casinoCount">Loading...</span>
    </div>
    <input type="text" class="search-box" id="searchInput" placeholder="Search casinos...">
    <div class="filters" id="filters">
      <div class="filter-chip active" data-filter="all">All</div>
      <div class="filter-chip" data-filter="active">Active</div>
      <div class="filter-chip" data-filter="usa">🇺🇸 USA</div>
      <div class="filter-chip" data-filter="bonus">Has Bonus</div>
      <div class="filter-chip" data-filter="freespins">Free Spins</div>
      <div class="filter-chip" data-filter="low-wager">Low Wager</div>
      <div class="filter-chip" data-filter="high-bonus">High Bonus</div>
    </div>
    <div class="sort-bar">
      <span>Sort:</span>
      <select id="sortSelect">
        <option value="name">Name</option>
        <option value="bonus-high">Bonus Amount ↑</option>
        <option value="bonus-low">Bonus Amount ↓</option>
        <option value="wager-low">Wagering ↓</option>
      </select>
    </div>
    <div class="casino-list" id="casinoList">
      <div class="loading">Loading casinos...</div>
    </div>
  </div>

  <div class="detail-view" id="detailView">
    <div class="detail-header">
      <button class="back-btn" onclick="showList()">←</button>
      <span>Casino Details</span>
    </div>
    <div class="detail-content" id="detailContent">
    </div>
  </div>

  <script>
    const API_BASE = 'https://casinosapi.com/api';
    const API_KEY = 'grokcasino-api-key-2026-02-24-abcdef123456';
    let allCasinos = [];
    let currentFilter = 'all';
    let currentSort = 'name';

    // Init Telegram WebApp
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    async function loadCasinos() {
      try {
        const res = await fetch(`${API_BASE}/casinos?limit=200&key=${API_KEY}`);
        const data = await res.json();
        allCasinos = data.casinos || [];
        renderCasinos();
      } catch (e) {
        document.getElementById('casinoList').innerHTML = `<div class="error">Failed to load casinos.<br>Please try again.</div>`;
      }
    }

    function getWagerValue(wagerStr) {
      if (!wagerStr || wagerStr === 'n/a' || wagerStr === 'Check terms') return 999;
      const match = wagerStr.match(/(\d+)/);
      return match ? parseInt(match[1]) : 999;
    }

    function getBonusAmount(casino) {
      return casino.bonus_structure?.max_amount || 0;
    }

    function getHealthStatus(c) {
      if (c.defunct) return { label: 'Defunct', class: 'defunct' };
      if (c.health_status?.status === 'ok') return { label: 'Active', class: 'ok' };
      return { label: 'Issue', class: 'error' };
    }

    function isUSCasino(c) {
      return c.casino_name.toLowerCase().includes(', usa') ||
             c.casino_name.toLowerCase().includes(' usa') ||
             c.casino_name.toLowerCase().includes(' us ');
    }

    function filterAndSort(casinos) {
      let filtered = casinos;

      // Search
      const query = document.getElementById('searchInput').value.toLowerCase();
      if (query) {
        filtered = filtered.filter(c =>
          c.casino_name.toLowerCase().includes(query) ||
          (c.bonus && c.bonus.toLowerCase().includes(query)) ||
          (c.ai_summary && c.ai_summary.toLowerCase().includes(query))
        );
      }

      // Filter chips
      switch (currentFilter) {
        case 'bonus':
          filtered = filtered.filter(c => c.bonus_structure?.percentage);
          break;
        case 'freespins':
          filtered = filtered.filter(c => (c.bonus_structure?.free_spins || 0) > 0);
          break;
        case 'low-wager':
          filtered = filtered.filter(c => getWagerValue(c.wagering?.bonus) <= 40);
          break;
        case 'high-bonus':
          filtered = filtered.filter(c => getBonusAmount(c) >= 500);
          break;
        case 'active':
          filtered = filtered.filter(c => !c.defunct && c.health_status?.status === 'ok');
          break;
        case 'usa':
          filtered = filtered.filter(c => isUSCasino(c));
          break;
      }

      // Sort
      switch (currentSort) {
        case 'bonus-high':
          filtered.sort((a, b) => getBonusAmount(b) - getBonusAmount(a));
          break;
        case 'bonus-low':
          filtered.sort((a, b) => getBonusAmount(a) - getBonusAmount(b));
          break;
        case 'wager-low':
          filtered.sort((a, b) => getWagerValue(a.wagering?.bonus) - getWagerValue(b.wagering?.bonus));
          break;
        default:
          filtered.sort((a, b) => a.casino_name.localeCompare(b.casino_name));
      }

      return filtered;
    }

    function renderCasinos() {
      const filtered = filterAndSort(allCasinos);
      document.getElementById('casinoCount').textContent = `${filtered.length} casinos`;

      if (filtered.length === 0) {
        document.getElementById('casinoList').innerHTML = `<div class="empty-state">No casinos found</div>`;
        return;
      }

      document.getElementById('casinoList').innerHTML = filtered.map(c => {
        const trust = c.trust?.score || 0;
        const trustClass = trust >= 7 ? '' : trust >= 5 ? 'medium' : 'low';
        const trustLabel = trust >= 7 ? 'High' : trust >= 5 ? 'Medium' : 'Low';
        const wager = c.wagering?.bonus || 'N/A';
        const maxBonus = c.bonus_structure?.max_amount ? `€${c.bonus_structure.max_amount}` : '';
        const freeSpins = c.bonus_structure?.free_spins ? `${c.bonus_structure.free_spins} FS` : '';
        const health = getHealthStatus(c);
        const statusClass = c.defunct ? 'status-defunct' : (c.health_status?.status === 'ok' ? 'status-ok' : 'status-issue');
        const usFlag = isUSCasino(c) ? '🇺🇸 ' : '';

        return `
          <div class="casino-card ${statusClass}" onclick="showDetail('${c.slug}')">
            <div class="card-header">
              <div class="casino-name">${usFlag}${c.casino_name}</div>
              <div class="trust-badge ${trustClass}">${trustLabel}</div>
            </div>
            <div class="bonus-line">${c.bonus}</div>
            <div class="meta-row">
              ${maxBonus ? `<span>💰 ${maxBonus}</span>` : ''}
              ${freeSpins ? `<span>🎰 ${freeSpins}</span>` : ''}
              <span>🔄 ${wager}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    function showDetail(slug) {
      const casino = allCasinos.find(c => c.slug === slug);
      if (!casino) return;

      const content = document.getElementById('detailContent');
      const wagerBonus = casino.wagering?.bonus || 'N/A';
      const wagerFS = casino.wagering?.free_spins || 'N/A';
      const maxBonus = casino.bonus_structure?.max_amount || 'N/A';
      const percentage = casino.bonus_structure?.percentage || 'N/A';
      const freeSpins = casino.bonus_structure?.free_spins || 0;

      const detailHealth = getHealthStatus(casino);

      const detailUSFlag = isUSCasino(casino) ? '🇺🇸 ' : '';

      content.innerHTML = `
        <div class="detail-title">${detailUSFlag}${casino.casino_name} <span class="health-badge ${detailHealth.class}">${detailHealth.label}</span></div>
        <div class="detail-bonus">${casino.bonus}</div>

        <div class="detail-section">
          <h3>Bonus Structure</h3>
          <div class="wagering-grid">
            <div class="wagering-item">
              <div class="label">Match %</div>
              <div class="value">${percentage !== 'N/A' ? percentage + '%' : 'N/A'}</div>
            </div>
            <div class="wagering-item">
              <div class="label">Max Bonus</div>
              <div class="value">${maxBonus !== 'N/A' ? '€' + maxBonus : 'N/A'}</div>
            </div>
            <div class="wagering-item">
              <div class="label">Free Spins</div>
              <div class="value">${freeSpins || 'None'}</div>
            </div>
            <div class="wagering-item">
              <div class="label">Trust Score</div>
              <div class="value">${casino.trust?.score || 'N/A'}/10</div>
            </div>
          </div>
        </div>

        <div class="detail-section">
          <h3>Wagering Requirements</h3>
          <div class="wagering-grid">
            <div class="wagering-item">
              <div class="label">Bonus Wager</div>
              <div class="value">${wagerBonus}</div>
            </div>
            <div class="wagering-item">
              <div class="label">Free Spins Wager</div>
              <div class="value">${wagerFS}</div>
            </div>
          </div>
        </div>

        <div class="detail-section">
          <h3>About</h3>
          <p>${casino.ai_summary || casino.info || 'No description available.'}</p>
        </div>

        ${casino.info && casino.info !== casino.ai_summary ? `
        <div class="detail-section">
          <h3>Details</h3>
          <p>${casino.info}</p>
        </div>
        ` : ''}

        <div class="detail-section">
          <h3>Verification</h3>
          <p>Status: ${casino.verification?.status || 'Unknown'}<br>
          Last verified: ${casino.verification?.last_verified || 'N/A'}<br>
          Confidence: ${casino.verification?.confidence || 'N/A'}</p>
        </div>

        <button class="visit-btn" onclick="visitCasino('${casino.url}')">Visit Casino</button>
      `;

      document.getElementById('detailView').classList.add('active');
      if (tg) tg.BackButton.show();
    }

    function showList() {
      document.getElementById('detailView').classList.remove('active');
      if (tg) tg.BackButton.hide();
    }

    function visitCasino(url) {
      if (tg) {
        tg.openLink(url);
      } else {
        window.open(url, '_blank');
      }
    }

    // Event listeners
    document.getElementById('searchInput').addEventListener('input', renderCasinos);
    document.getElementById('sortSelect').addEventListener('change', (e) => {
      currentSort = e.target.value;
      renderCasinos();
    });

    document.getElementById('filters').addEventListener('click', (e) => {
      if (e.target.classList.contains('filter-chip')) {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        currentFilter = e.target.dataset.filter;
        renderCasinos();
      }
    });

    if (tg) {
      tg.BackButton.onClick(showList);
    }

    // Load on start
    loadCasinos();
  </script>
</body>
</html>
